<!DOCTYPE html>
<html lang="zh-Hant" class="theme-dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>縱谷無言．事件地圖｜花蓮高商</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""/>
<link rel="stylesheet" href="../assets/styles/design_tokens.css">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body {
  background: var(--bg-page);
  color: var(--text-primary);
  font-family: var(--font-serif);
  line-height: var(--lh-body);
  overflow-x: hidden;
}

/* ---------- 頂部 ---------- */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.2rem 2rem;
  border-top: 3px solid var(--accent);
  border-bottom: 0.5px solid var(--line-thin);
  background: var(--bg-page);
}
.topbar-eyebrow {
  font-family: var(--font-sans);
  font-size: 11px;
  letter-spacing: 0.4em;
  color: var(--text-muted);
}
.topbar-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-title);
  letter-spacing: 0.1em;
  margin: 0.2rem 0 0;
}
.topbar-back {
  font-family: var(--font-sans);
  font-size: 11px;
  letter-spacing: 0.3em;
  color: var(--text-muted);
  border: 0.5px solid var(--line-soft);
  padding: 8px 14px;
  transition: color 0.2s, border-color 0.2s;
  text-decoration: none;
}
.topbar-back:hover {
  color: var(--accent);
  border-color: var(--accent);
}

/* ---------- 主版面 ---------- */
.map-stage {
  display: grid;
  grid-template-columns: 1fr 460px;
  height: calc(100vh - 90px);
  min-height: 540px;
}
@media (max-width: 880px) {
  .map-stage {
    grid-template-columns: 1fr;
    height: auto;
  }
}

/* ---------- 左：地圖 ---------- */
.map-pane {
  position: relative;
  background: var(--bg-main);
}
@media (max-width: 880px) {
  .map-pane { height: 60vh; min-height: 380px; border-bottom: 0.5px solid var(--line-thin); }
}
#leaflet-map {
  width: 100%;
  height: 100%;
  background: #0E0B08;
}

/* Leaflet：與我們深色版的視覺對齊 */
.leaflet-container {
  font-family: var(--font-sans);
  background: #0E0B08;
}
.leaflet-control-zoom {
  border: 0.5px solid var(--line-soft) !important;
  box-shadow: none !important;
}
.leaflet-control-zoom a {
  background: rgba(43, 37, 32, 0.85) !important;
  color: var(--text-title) !important;
  border-color: var(--line-thin) !important;
}
.leaflet-control-zoom a:hover {
  background: rgba(43, 37, 32, 1) !important;
  color: var(--accent) !important;
}
.leaflet-control-attribution {
  background: rgba(14, 11, 8, 0.7) !important;
  color: var(--text-muted) !important;
  font-size: 10px !important;
  letter-spacing: 0.1em;
}
.leaflet-control-attribution a {
  color: var(--text-second) !important;
}

/* 自製 marker：圓點 + pulse 環 */
.event-marker {
  position: relative;
  width: 22px; height: 22px;
}
.event-marker .dot {
  position: absolute; inset: 6px;
  border-radius: 50%;
  background: var(--m-color);
  border: 1.5px solid #F5F1EA;
  box-shadow: 0 0 0 2px rgba(14, 11, 8, 0.6);
  cursor: pointer;
  transition: transform 0.2s;
}
.event-marker .pulse {
  position: absolute; inset: 0;
  border-radius: 50%;
  border: 1px solid var(--m-color);
  opacity: 0;
  animation: m-pulse 2.4s ease-out infinite;
  pointer-events: none;
}
.event-marker.is-active .dot {
  transform: scale(1.3);
}
@keyframes m-pulse {
  0%   { transform: scale(0.5); opacity: 0.7; }
  80%  { transform: scale(1.5); opacity: 0; }
  100% { transform: scale(1.5); opacity: 0; }
}

/* 標籤 tooltip */
.event-marker-tooltip {
  background: rgba(43, 37, 32, 0.92) !important;
  border: 0.5px solid var(--line-soft) !important;
  color: var(--text-title) !important;
  font-family: var(--font-serif) !important;
  font-size: 13px !important;
  font-weight: 600 !important;
  letter-spacing: 0.05em !important;
  padding: 4px 10px !important;
  border-radius: 0 !important;
  box-shadow: none !important;
}
.event-marker-tooltip::before { display: none !important; }
.leaflet-tooltip-right.event-marker-tooltip { margin-left: 12px; }
.leaflet-tooltip-left.event-marker-tooltip  { margin-right: 12px; }

.tt-year {
  display: block;
  font-family: var(--font-sans);
  font-size: 10px;
  letter-spacing: 0.25em;
  font-weight: 400;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ---------- 右：資訊面板 ---------- */
.info-pane {
  padding: 2.4rem 2rem;
  background: var(--bg-page);
  position: relative;
  overflow-y: auto;
  border-left: 0.5px solid var(--line-thin);
}
@media (max-width: 880px) {
  .info-pane { border-left: none; }
}
.panel-eyebrow {
  font-family: var(--font-sans);
  font-size: 11px;
  letter-spacing: 0.4em;
  color: var(--text-muted);
  margin-bottom: 1.4rem;
}
.panel-hero-img {
  display: block;
  width: 100%;
  height: 180px;
  object-fit: cover;
  object-position: center;
  border-radius: 8px;
  margin-bottom: 1.6rem;
  opacity: 0.88;
  border: 0.5px solid var(--line-thin);
}

/* 預設面板 */
.panel-empty-title {
  font-size: clamp(22px, 2.6vw, 30px);
  font-weight: 600;
  color: var(--text-title);
  margin: 0 0 1.4rem;
  letter-spacing: 0.04em;
  line-height: 1.4;
}
.panel-empty-body {
  font-size: 15px;
  line-height: 1.9;
  color: var(--text-second);
  max-width: 380px;
}
.panel-empty-hint {
  font-family: var(--font-sans);
  font-size: 12px;
  letter-spacing: 0.3em;
  color: var(--accent);
  margin-top: 2.4rem;
}
.panel-empty-foot {
  font-family: var(--font-sans);
  font-size: 10px;
  letter-spacing: 0.25em;
  color: var(--text-muted);
  margin-top: 2rem;
}
.hint-arrow { display: inline-block; margin-right: 8px; }
@media (max-width: 880px) {
  .hint-arrow { display: none; }
}

/* 已選事件面板 */
.panel-event-meta {
  display: flex; gap: 1rem; align-items: baseline;
  margin-bottom: 0.6rem;
}
.panel-event-year {
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.2em;
}
.panel-event-eng {
  font-family: var(--font-sans);
  font-size: 11px;
  letter-spacing: 0.3em;
  color: var(--text-muted);
}
.panel-event-name {
  font-size: clamp(26px, 3vw, 36px);
  font-weight: 600;
  color: var(--text-title);
  margin: 0 0 0.4rem;
  letter-spacing: 0.04em;
}
.panel-event-place {
  font-family: var(--font-sans);
  font-size: 12px;
  letter-spacing: 0.1em;
  color: var(--text-second);
  margin: 0 0 1.2rem;
}
.panel-event-tagline {
  font-size: 15px;
  color: var(--text-second);
  font-style: italic;
  line-height: 1.85;
  border-left: 2px solid;
  padding-left: 1rem;
  margin: 0 0 2rem;
  max-width: 380px;
}
.panel-event-count {
  font-family: var(--font-sans);
  font-size: 11px;
  letter-spacing: 0.3em;
  color: var(--text-muted);
  margin-bottom: 0.6rem;
}

/* 引文卡 */
.quote-list { display: flex; flex-direction: column; gap: 1.2rem; }
.quote-card {
  background: var(--bg-card);
  padding: 1.4rem 1.4rem 1.2rem;
  border-left: 3px solid;
  position: relative;
}
.quote-prompt {
  font-family: var(--font-sans);
  font-size: 10px;
  letter-spacing: 0.3em;
  color: var(--text-muted);
  margin-bottom: 0.6rem;
}
.quote-text {
  font-family: var(--font-serif);
  font-size: 15px;
  line-height: 1.85;
  color: var(--text-primary);
  margin: 0 0 0.8rem;
}
.quote-byline {
  font-family: var(--font-sans);
  font-size: 11px;
  letter-spacing: 0.2em;
  color: var(--text-muted);
  text-align: right;
}
.quote-empty {
  font-family: var(--font-sans);
  font-size: 13px;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  padding: 1.2rem;
  text-align: center;
  border: 0.5px dashed var(--line-soft);
}

.panel-close {
  position: absolute;
  top: 1.2rem; right: 1.2rem;
  background: none;
  border: 0.5px solid var(--line-soft);
  color: var(--text-muted);
  width: 32px; height: 32px;
  cursor: pointer;
  font-size: 16px;
  font-family: var(--font-sans);
  line-height: 1;
  transition: color 0.2s, border-color 0.2s;
}
.panel-close:hover { color: var(--accent); border-color: var(--accent); }

/* 底部 */
.map-foot {
  text-align: center;
  padding: 1.2rem 2rem 1.8rem;
  font-family: var(--font-sans);
  font-size: 10px;
  letter-spacing: 0.3em;
  color: var(--text-muted);
  border-top: 0.5px solid var(--line-thin);
}
</style>
</head>
<body>

<header class="topbar">
  <div>
    <div class="topbar-eyebrow">花蓮高商　‧　縱谷無言．原住民族重大歷史事件</div>
    <h1 class="topbar-title">縱谷無言．事件地圖</h1>
  </div>
  <a href="class_showcase.html" class="topbar-back">← 班級成果</a>
</header>

<main class="map-stage">

  <section class="map-pane">
    <div id="leaflet-map" role="region" aria-label="花蓮縣事件地圖"></div>
  </section>

  <aside class="info-pane" id="info-pane">
    
    <div class="panel-empty">
      <img class="panel-hero-img" src="../assets/images/hero_valley.png" alt="">
      <div class="panel-eyebrow">縱谷無言．事件地圖</div>
      <h2 class="panel-empty-title">縱谷把痛苦悄悄埋起來。<br/>地圖把它們指出來。</h2>
      <p class="panel-empty-body">
        花蓮的山與海之間，發生過四場讓族人失語的大事。
        我們用 2 位學生的省思亮點，重新說一次。
      </p>
      <p class="panel-empty-hint">
        <span class="hint-arrow">←</span> 點地圖上任一個事件
      </p>
      <div class="event-color-bar" style="margin-top: 2rem;">
        <div class="seg-cepo"></div>
        <div class="seg-dafen"></div>
        <div class="seg-cikasuan"></div>
        <div class="seg-truku"></div>
      </div>
      <p class="panel-empty-foot">
        地圖底圖：OpenStreetMap 貢獻者　／　CARTO Dark Matter
      </p>
    </div>
    
  </aside>

</main>

<footer class="map-foot">
  花蓮高商．多元文化與文學．原住民族單元　‧　共 2 位學生　‧　地圖底圖：© OpenStreetMap、© CARTO
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
<script>
  const PANEL_DATA = {"truku": {"name": "太魯閣戰役", "eng": "Truku 戰役", "year": "1914", "ethnic": "太魯閣族（含部分賽德克族）", "place": "主戰場立霧溪、木瓜溪上游山區", "tagline": "兩萬軍警對三千族人。佐久間死了，族人退下山。今天那裡叫太魯閣國家公園。", "lat": 24.1572, "lng": 121.6213, "color": "#B84741", "count": 1, "quotes": [{"text": "我重新理解山路和古道不只是觀光路線，也連著族人保護土地的故事。", "name": "測O乙", "class_name": "商二甲", "seat": "02", "prompt": "省思句"}, {"text": "官方說法看見統治推進，族人說法看見守護家園。", "name": "測O乙", "class_name": "商二甲", "seat": "02", "prompt": "差異句"}], "image": "../assets/images/event_truku.png"}, "cikasuan": {"name": "七腳川事件", "eng": "Cikasuan", "year": "1908", "ethnic": "阿美族 ‧ 南勢阿美", "place": "花蓮縣吉安鄉（古名 Cikasuan）", "tagline": "一個社被滅，地名換了兩次：Cikasuan → 吉野村 → 吉安。", "lat": 23.97, "lng": 121.5775, "color": "#E8C56B", "count": 1, "quotes": [{"text": "我重新理解花蓮的溪流不只是地景，也可能保存族人遷徙與受傷的記憶。", "name": "測O甲", "class_name": "商二甲", "seat": "01", "prompt": "省思句"}, {"text": "官方說法強調治理秩序，部落觀點強調土地與生存被壓迫。", "name": "測O甲", "class_name": "商二甲", "seat": "01", "prompt": "差異句"}], "image": "../assets/images/event_cikasuan.png"}, "cepo": {"name": "大港口事件", "eng": "Cepo' 戰役", "year": "1877", "ethnic": "阿美族 ‧ 秀姑巒阿美", "place": "花蓮縣豐濱鄉靜浦村", "tagline": "清軍以「招撫」之名誘殺阿美青年。事後於屠殺地建靜浦國小、靜浦營，地名也被「靜浦」取代。", "lat": 23.472, "lng": 121.5025, "color": "#E85A52", "count": 0, "quotes": [], "image": "../assets/images/event_cepo.png"}, "dafen": {"name": "大分事件", "eng": "布農抗日", "year": "1915", "ethnic": "布農族 ‧ 巒社群、丹社群", "place": "花蓮縣卓溪鄉（玉山國家公園）", "tagline": "拉荷．阿雷與族人從 1915 抵抗到 1933，整整 18 年；1933 才以「歸順」名義落幕。", "lat": 23.278, "lng": 121.083, "color": "#5B7CA8", "count": 0, "quotes": [], "image": "../assets/images/event_dafen.png"}};
  const DEFAULT_HTML = "\n    <div class=\"panel-empty\">\n      <img class=\"panel-hero-img\" src=\"../assets/images/hero_valley.png\" alt=\"\">\n      <div class=\"panel-eyebrow\">縱谷無言．事件地圖</div>\n      <h2 class=\"panel-empty-title\">縱谷把痛苦悄悄埋起來。<br/>地圖把它們指出來。</h2>\n      <p class=\"panel-empty-body\">\n        花蓮的山與海之間，發生過四場讓族人失語的大事。\n        我們用 2 位學生的省思亮點，重新說一次。\n      </p>\n      <p class=\"panel-empty-hint\">\n        <span class=\"hint-arrow\">←</span> 點地圖上任一個事件\n      </p>\n      <div class=\"event-color-bar\" style=\"margin-top: 2rem;\">\n        <div class=\"seg-cepo\"></div>\n        <div class=\"seg-dafen\"></div>\n        <div class=\"seg-cikasuan\"></div>\n        <div class=\"seg-truku\"></div>\n      </div>\n      <p class=\"panel-empty-foot\">\n        地圖底圖：OpenStreetMap 貢獻者　／　CARTO Dark Matter\n      </p>\n    </div>\n    ";

  const pane = document.getElementById('info-pane');
  let activeId = null;
  const markers = {};

  // ---------- 地圖 ----------
  const map = L.map('leaflet-map', {
    center: [23.75, 121.40],
    zoom: 9,
    minZoom: 8,
    maxZoom: 14,
    zoomControl: true,
    attributionControl: true,
    scrollWheelZoom: true,
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);

  // ---------- Marker：自製 div icon ----------
  function makeIcon(color) {
    return L.divIcon({
      className: '',
      iconSize: [22, 22],
      iconAnchor: [11, 11],
      html: `<div class="event-marker" style="--m-color: ${color};">
               <div class="pulse"></div>
               <div class="dot"></div>
             </div>`
    });
  }

  Object.keys(PANEL_DATA).forEach(eid => {
    const ev = PANEL_DATA[eid];
    const m = L.marker([ev.lat, ev.lng], {
      icon: makeIcon(ev.color),
      keyboard: true,
      title: ev.name + ' ' + ev.year,
    }).addTo(map);

    m.bindTooltip(`${ev.name}<span class="tt-year">${ev.year}　${ev.count} 位學生</span>`, {
      permanent: true,
      direction: 'right',
      offset: [12, 0],
      className: 'event-marker-tooltip',
      interactive: false,
    });

    m.on('click', () => selectEvent(eid));
    markers[eid] = m;
  });

  // 自動 fit 到四個事件範圍
  const bounds = L.latLngBounds(Object.values(PANEL_DATA).map(e => [e.lat, e.lng]));
  map.fitBounds(bounds, { padding: [60, 80] });

  // ---------- Panel ----------
  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function selectEvent(eid) {
    const ev = PANEL_DATA[eid];
    if (!ev) return;
    activeId = eid;

    // marker 視覺
    Object.entries(markers).forEach(([id, m]) => {
      const el = m.getElement && m.getElement();
      if (el) {
        const inner = el.querySelector('.event-marker');
        if (inner) inner.classList.toggle('is-active', id === eid);
      }
    });

    // 平移到該點
    map.panTo([ev.lat, ev.lng], { animate: true, duration: 0.5 });

    let quotesHtml = '';
    if (ev.quotes.length === 0) {
      quotesHtml = '<div class="quote-empty">這個事件還沒有學生作品</div>';
    } else {
      quotesHtml = ev.quotes.map(q => `
        <article class="quote-card" style="border-left-color: ${ev.color};">
          <div class="quote-prompt" style="color: ${ev.color};">${escapeHtml(q.prompt)}</div>
          <p class="quote-text">${escapeHtml(q.text)}</p>
          <div class="quote-byline">— ${escapeHtml(q.class_name)}　${escapeHtml(q.seat)}　${escapeHtml(q.name)}</div>
        </article>
      `).join('');
    }

    pane.innerHTML = `
      <button class="panel-close" id="panel-close" aria-label="返回">×</button>
      <img class="panel-hero-img" src="${ev.image}" alt="">
      <div class="panel-eyebrow" style="color: ${ev.color};">${escapeHtml(ev.ethnic)}</div>
      <div class="panel-event-meta">
        <span class="panel-event-year" style="color: ${ev.color};">${escapeHtml(ev.year)}</span>
        <span class="panel-event-eng">${escapeHtml(ev.eng)}</span>
      </div>
      <h2 class="panel-event-name">${escapeHtml(ev.name)}</h2>
      <p class="panel-event-place">${escapeHtml(ev.place)}</p>
      <p class="panel-event-tagline" style="border-left-color: ${ev.color};">${escapeHtml(ev.tagline)}</p>
      <div class="panel-event-count">學生省思亮點　‧　共 ${ev.count} 位學生</div>
      <div class="quote-list">${quotesHtml}</div>
    `;
    document.getElementById('panel-close').addEventListener('click', resetPane);

    if (window.innerWidth < 880) {
      pane.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }

  function resetPane() {
    activeId = null;
    Object.values(markers).forEach(m => {
      const el = m.getElement && m.getElement();
      if (el) {
        const inner = el.querySelector('.event-marker');
        if (inner) inner.classList.remove('is-active');
      }
    });
    pane.innerHTML = DEFAULT_HTML;
    map.fitBounds(bounds, { padding: [60, 80] });
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && activeId) resetPane();
  });
</script>

</body>
</html>
